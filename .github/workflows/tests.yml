name: Tests 14 sprint

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
env:
  DIR_TESTS: /tmp/tests-back-to-the-film
  REP_TESTS: https://github.com/Yandex-Practicum/tests-back-to-the-film.git
jobs:
  test_backend:
    runs-on: ubuntu-latest
    steps:
    - name: Set up GitHub Actions
      uses: actions/checkout@v4
    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
    - name: Get testing lib
      run: set -eu && git clone --depth 1 $REP_TESTS $DIR_TESTS
    - name: Run tests
      run: bash $DIR_TESTS/bin/backend.sh
  test_endpoints:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - name: Set up GitHub Actions
      uses: actions/checkout@v4
    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
    - name: Get testing lib
      run: set -eu && git clone --depth 1 $REP_TESTS $DIR_TESTS
    - name: Install backend dependencies
      working-directory: backend
      run: npm ci
    - name: Configure backend env
      working-directory: backend
      run: |
        cat <<'EOF' > .env
        DATABASE_URL=mongodb://127.0.0.1:27017/afisha
        DATABASE_USERNAME=
        DATABASE_PASSWORD=
        EOF
    - name: Seed MongoDB data
      working-directory: backend
      run: node test/seed-mongodb.js
    - name: Start backend
      working-directory: backend
      run: |
        npm run start:dev > ../backend.log 2>&1 &
        echo $! > ../backend.pid
    - name: Wait for backend
      run: |
        for i in {1..45}; do
          if curl -fs http://127.0.0.1:3000/api/afisha/films > /dev/null; then
            exit 0
          fi
          sleep 2
        done
        echo "Backend did not become ready" >&2
        [[ -f backend.log ]] && cat backend.log
        exit 1
    - name: Run tests
      run: bash $DIR_TESTS/bin/endpoints.sh
    - name: Stop backend
      if: always()
      run: |
        if [[ -f backend.pid ]]; then
          kill $(cat backend.pid) || true
        fi
        [[ -f backend.log ]] && cat backend.log
