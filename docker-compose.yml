services:
  frontend-builder:
    image: ghcr.io/${GHCR_OWNER:-elenagorozheeva}/film-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/afisha
        VITE_CDN_URL: /content/afisha
    volumes:
      - frontend_dist:/frontend-dist
    networks:
      - film_network
    restart: unless-stopped

  backend:
    image: ghcr.io/${GHCR_OWNER:-elenagorozheeva}/film-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      LOG_FORMAT: json
      DATABASE_URL: mongodb://mongo:27017/afisha
      DEBUG: '*'
    depends_on:
      mongo:
        condition: service_healthy
      mongo-seed:
        condition: service_completed_successfully
    networks:
      - film_network
    restart: unless-stopped

  nginx:
    image: ghcr.io/${GHCR_OWNER:-elenagorozheeva}/film-nginx:latest
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - '80:80'
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_started
      frontend-builder:
        condition: service_started
    networks:
      - film_network
    restart: unless-stopped

  mongo:
    image: mongo:7
    command: ['--bind_ip_all']
    healthcheck:
      test: ['CMD-SHELL', 'mongosh --quiet --eval "db.adminCommand({ ping: 1 }).ok" || exit 1']
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - mongo_data:/data/db
    networks:
      - film_network
    restart: unless-stopped

  mongo-seed:
    image: mongo:7
    command:
      [
        'sh',
        '-c',
        'mongoimport --host mongo --db afisha --collection films --file /seed/mongodb_initial_stub.json --jsonArray --drop',
      ]
    volumes:
      - ./backend/test/mongodb_initial_stub.json:/seed/mongodb_initial_stub.json:ro
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - film_network
    restart: 'no'

  mongo-express:
    image: mongo-express:1.0.2
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: '27017'
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    ports:
      - '8080:8081'
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - film_network
    restart: unless-stopped

volumes:
  frontend_dist:
  mongo_data:

networks:
  film_network:
    driver: bridge
